# Smithery.ai configuration for PrivacyScrubber MCP Server
startCommand:
  type: "stdio"
  commandFunction: |-
    (config) => ({
      command: 'node',
      args: ['./index.js'],
      env: {
        PRIVACYSCRUBBER_KEY: (config && config.PRIVACYSCRUBBER_KEY) || ''
      }
    })
exampleConfig: {}
